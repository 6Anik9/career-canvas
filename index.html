<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareerCanvas | Created by 6ANIK9</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="welcomeScreen">
    <div class="welcome-content">
        <h1 class="hero-title">Career <span style="font-weight:100; font-style:italic;">Canvas</span></h1>
        <p class="hero-sub">Minimalist CV Generator</p>
        <button class="start-btn" onclick="enterApp()">Tap To Create</button>
    </div>

    <div class="welcome-footer">
        <div class="dev-by">Design & Developed By</div>
        <div class="welcome-socials">
            <a href="https://github.com/6ANIK9" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.facebook.com/6mdaniksheikh9" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/6mdaniksheikh9" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="nav">
        <div class="nav-item active" id="btnEdit" onclick="tab('edit')">01. Compose</div>
        <div class="nav-item" id="btnView" onclick="tab('view')">02. Preview</div>
    </div>

    <div class="container">
        <div id="editArea" class="form-view">
            <div class="field-group">
                <label>Portrait Upload</label>
                <input type="file" accept="image/*" onchange="updateImg(event)">
            </div>
            <div class="field-group">
                <label>Executive Summary</label>
                <input type="text" id="iName" placeholder="Legal Full Name" oninput="sync()">
                <input type="text" id="iTitle" placeholder="Current Designation / Role" oninput="sync()" style="margin-top:10px">
            </div>
            <div class="field-group">
                <label>Contact Channels</label>
                <input type="text" id="iPhone" placeholder="Mobile Number" oninput="sync()">
                <input type="email" id="iEmail" placeholder="Official Email Address" oninput="sync()" style="margin-top:10px">
                <input type="text" id="iAddr" placeholder="Primary Location (City, Country)" oninput="sync()" style="margin-top:10px">
            </div>
            <div class="field-group">
                <label>Professional Path</label>
                <textarea id="iEdu" rows="4" placeholder="Academic History & Credentials..." oninput="sync()"></textarea>
                <textarea id="iExp" rows="4" placeholder="Professional Experience & Key Achievements..." oninput="sync()" style="margin-top:10px"></textarea>
            </div>
            <div class="field-group">
                <label>Technical Proficiencies (Format: HTML:90, Leadership:100)</label>
                <input type="text" id="iSkills" placeholder="Skill:Strength" oninput="sync()">
            </div>
            <div class="field-group">
                <label>Attestation</label>
                <textarea id="iRef" rows="2" placeholder="References Available Upon Request..." oninput="sync()"></textarea>
            </div>
        </div>

        <div id="viewArea" class="cv-preview hidden">
            <div id="captureArea" class="cv-inner">
                <div class="cv-header">
                    <img id="oImg" class="cv-photo" src="https://via.placeholder.com/150">
                    <h1 id="oName" style="font-family: Georgia, serif; font-size: 28px; margin: 0; letter-spacing: -1px;">NAME</h1>
                    <div id="oTitle" style="font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--muted); margin-top: 8px;">DESIGNATION</div>
                    <div class="contact-bar">
                        <span id="oPhone"></span> • <span id="oEmail"></span> • <span id="oAddr"></span>
                    </div>
                </div>

                <div class="section"><div class="section-h">Academic Credentials</div><div class="content" id="oEdu"></div></div>
                <div class="section"><div class="section-h">Professional Tenure</div><div class="content" id="oExp"></div></div>
                <div class="section"><div class="section-h">Core Proficiencies</div><div id="skillBars"></div></div>
                <div class="section"><div class="section-h">Reference Attestation</div><div class="content" id="oRef"></div></div>

                <div class="cv-bottom">
                    <div style="font-size: 11px; color: var(--muted); font-weight: 700;">Issue Date: <span id="currentDate"></span></div>
                    <div class="sig-wrapper"><div style="font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--charcoal);">Authorized Signature</div></div>
                </div>

                <div class="cv-footer">
                    <div style="font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; color: var(--muted); font-weight: 800;">developed by</div>
                    <div class="socials">
                        <a href="https://www.facebook.com/6mdaniksheikh9" target="_blank"><i class="fab fa-facebook"></i></a>
                        <a href="https://github.com/6ANIK9" target="_blank"><i class="fab fa-github"></i></a>
                        <a href="https://www.instagram.com/6mdaniksheikh9" target="_blank"><i class="fab fa-instagram"></i></a>
                    </div>
                    <div style="font-size: 8px; color: #aaa; margin-top: 15px; letter-spacing: 5px;">Author • 6Anik9</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-round" style="background: var(--accent);" onclick="downloadImage()"><i class="fas fa-camera"></i></button>
        <button class="btn-round" onclick="window.print()"><i class="fas fa-file-pdf"></i></button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
