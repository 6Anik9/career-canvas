<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareerCanvas | Created by 6ANIK9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --bg: #FDFCFB; 
            --charcoal: #2D2926; 
            --accent: #C5A059; 
            --border: #E5E5E5;
            --muted: #8C8C8C;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--charcoal); margin: 0; padding: 0; overflow-x: hidden; }

        /* --- LANDING SCREEN --- */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--charcoal); color: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; text-align: center; padding: 20px;
        }
        .hero-title { font-family: 'Georgia', serif; font-size: 42px; letter-spacing: -1px; margin: 0; }
        .hero-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); margin-top: 10px; }
        
        .start-btn { 
            margin-top: 50px; padding: 16px 45px; border: 1px solid var(--accent); 
            background: transparent; color: var(--bg); cursor: pointer;
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2.5px;
        }
        .start-btn:hover { background: var(--accent); color: var(--charcoal); box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }

        .welcome-footer { position: absolute; bottom: 40px; text-align: center; width: 100%; }
        .dev-by { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--muted); margin-bottom: 15px; }
        .welcome-socials a { color: var(--bg); font-size: 22px; margin: 0 18px; text-decoration: none; opacity: 0.7; }
        .welcome-socials a:hover { color: var(--accent); opacity: 1; transform: translateY(-3px); }

        /* --- APP INTERFACE --- */
        .nav { display: flex; justify-content: center; gap: 30px; padding: 15px 0; background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .nav-item { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--charcoal); border-bottom-color: var(--charcoal); }

        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px 15px 120px 15px; }
        .hidden { display: none !important; }

        .field-group { margin-bottom: 20px; }
        label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); display: block; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; background: #fff; }

        /* --- CV PREVIEW --- */
        .cv-inner { padding: 40px 25px; border: 1px solid var(--border); background: var(--bg); position: relative; }
        .cv-header { text-align: center; margin-bottom: 25px; }
        .cv-photo { width: 110px; height: 110px; border: 1px solid var(--charcoal); object-fit: cover; margin-bottom: 15px; padding: 4px; background: white; }
        .contact-bar { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); margin: 15px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 10px 0; }

        .section-h { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .content { font-size: 12.5px; color: #333; white-space: pre-line; margin-bottom: 20px; }

        .skill-container { margin-bottom: 12px; }
        .skill-info { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .progress-bg { width: 100%; height: 6px; background: #e8e8e8; border-radius: 10px; }
        .progress-fill { height: 100%; background: var(--charcoal); width: 0%; border-radius: 10px; }

        .cv-bottom { margin-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-wrapper { text-align: center; width: 140px; border-top: 1px solid var(--charcoal); padding-top: 5px; }

        .cv-footer { margin-top: 50px; text-align: center; border-top: 1px solid var(--border); padding-top: 25px; }
        .socials a { color: var(--charcoal); font-size: 20px; margin: 0 15px; text-decoration: none; }

        .controls { position: fixed; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1100; }
        .btn-round { background: var(--charcoal); color: var(--bg); width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @media print { #welcomeScreen, .nav, .controls, .form-view { display: none !important; } }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <h1 class="hero-title">Career <span style="font-weight:100; font-style:italic;">Canvas</span></h1>
    <p class="hero-sub">Minimalist CV Generator</p>
    
    <button class="start-btn" onclick="enterApp()">Get Started</button>

    <div class="welcome-footer">
        <div class="dev-by">Credit Goes To</div>
        <div class="welcome-socials">
            <a href="https://github.com/6ANIK9" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.instagram.com/6mdaniksheikh9" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="nav">
        <div class="nav-item active" id="btnEdit" onclick="tab('edit')">1. Compose</div>
        <div class="nav-item" id="btnView" onclick="tab('view')">2. Preview</div>
    </div>

    <div class="container">
        <div id="editArea" class="form-view">
            <div class="field-group">
                <label>Profile Image</label>
                <input type="file" accept="image/*" onchange="updateImg(event)">
            </div>
            <div class="field-group">
                <label>Personal Info</label>
                <input type="text" id="iName" placeholder="Full Name" oninput="sync()">
                <input type="text" id="iTitle" placeholder="Professional Title" oninput="sync()" style="margin-top:8px">
            </div>
            <div class="field-group">
                <label>Contact</label>
                <input type="text" id="iPhone" placeholder="Phone" oninput="sync()">
                <input type="email" id="iEmail" placeholder="Email" oninput="sync()" style="margin-top:8px">
                <input type="text" id="iAddr" placeholder="Location" oninput="sync()" style="margin-top:8px">
            </div>
            <div class="field-group">
                <label>Career & Education</label>
                <textarea id="iEdu" rows="3" placeholder="Education background..." oninput="sync()"></textarea>
                <textarea id="iExp" rows="3" placeholder="Work history..." oninput="sync()" style="margin-top:8px"></textarea>
            </div>
            <div class="field-group">
                <label>Skills (Format: HTML:90, Management:80)</label>
                <input type="text" id="iSkills" placeholder="Skill:Percentage" oninput="sync()">
            </div>
            <div class="field-group">
                <label>Verification</label>
                <textarea id="iRef" rows="2" placeholder="References..." oninput="sync()"></textarea>
            </div>
        </div>

        <div id="viewArea" class="cv-preview hidden">
            <div id="captureArea" class="cv-inner">
                <div class="cv-header">
                    <img id="oImg" class="cv-photo" src="https://via.placeholder.com/150">
                    <h1 id="oName" style="font-family: Georgia, serif; font-size: 26px; margin: 0;">NAME</h1>
                    <div id="oTitle" style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-top: 5px;">DESIGNATION</div>
                    <div class="contact-bar">
                        <span id="oPhone"></span> <span id="oEmail"></span> <span id="oAddr"></span>
                    </div>
                </div>

                <div class="section"><div class="section-h">Academic</div><div class="content" id="oEdu"></div></div>
                <div class="section"><div class="section-h">Experience</div><div class="content" id="oExp"></div></div>
                <div class="section"><div class="section-h">Skills</div><div id="skillBars"></div></div>
                <div class="section"><div class="section-h">References</div><div class="content" id="oRef"></div></div>

                <div class="cv-bottom">
                    <div style="font-size: 10px; color: var(--muted);">Date: <span id="currentDate"></span></div>
                    <div class="sig-wrapper"><div style="font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--muted);">Authorized Signature</div></div>
                </div>

                <div class="cv-footer">
                    <div style="font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; color: var(--muted);">System Developed by</div>
                    <div class="socials">
                        <a href="https://www.instagram.com/6mdaniksheikh9" target="_blank"><i class="fab fa-instagram"></i></a>
                        <a href="https://github.com/6ANIK9" target="_blank"><i class="fab fa-github"></i></a>
                    </div>
                    <div style="font-size: 7px; color: #eee; margin-top: 10px;">CREDIT: 6ANIK9</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-round" style="background: var(--accent);" onclick="downloadImage()"><i class="fas fa-camera"></i></button>
        <button class="btn-round" onclick="window.print()"><i class="fas fa-file-pdf"></i></button>
    </div>
</div>

<script>
    console.log("%c CareerCanvas %c Developed by 6ANIK9 ", "color:white; background:#2D2926; padding:5px;", "color:white; background:#C5A059; padding:5px;");

    function enterApp() {
        const welcome = document.getElementById('welcomeScreen');
        welcome.style.opacity = '0';
        setTimeout(() => {
            welcome.style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
        }, 500);
    }

    window.onload = () => { document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB'); };

    function tab(mode) {
        if(mode === 'view') {
            document.getElementById('editArea').classList.add('hidden');
            document.getElementById('viewArea').classList.remove('hidden');
            document.getElementById('btnView').classList.add('active');
            document.getElementById('btnEdit').classList.remove('active');
            setTimeout(() => { 
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-percent') + "%";
                });
            }, 200);
        } else {
            document.getElementById('editArea').classList.remove('hidden');
            document.getElementById('viewArea').classList.add('hidden');
            document.getElementById('btnEdit').classList.add('active');
            document.getElementById('btnView').classList.remove('active');
        }
    }

    function sync() {
        document.getElementById('oName').innerText = document.getElementById('iName').value.toUpperCase() || "NAME";
        document.getElementById('oTitle').innerText = document.getElementById('iTitle').value || "DESIGNATION";
        document.getElementById('oPhone').innerText = document.getElementById('iPhone').value;
        document.getElementById('oEmail').innerText = document.getElementById('iEmail').value;
        document.getElementById('oAddr').innerText = document.getElementById('iAddr').value;
        document.getElementById('oEdu').innerText = document.getElementById('iEdu').value;
        document.getElementById('oExp').innerText = document.getElementById('iExp').value;
        document.getElementById('oRef').innerText = document.getElementById('iRef').value;
        
        const skillStr = document.getElementById('iSkills').value;
        const container = document.getElementById('skillBars');
        container.innerHTML = "";
        if(skillStr) {
            skillStr.split(',').forEach(item => {
                const p = item.split(':');
                if(p.length === 2) {
                    container.innerHTML += `<div class="skill-container"><div class="skill-info"><span>${p[0].trim()}</span><span>${p[1].trim()}%</span></div><div class="progress-bg"><div class="progress-fill" data-percent="${p[1].trim()}"></div></div></div>`;
                }
            });
        }
    }

    function updateImg(e) { if(e.target.files[0]) document.getElementById('oImg').src = URL.createObjectURL(e.target.files[0]); }

    function downloadImage() {
        if(document.getElementById('viewArea').classList.contains('hidden')) tab('view');
        setTimeout(() => {
            html2canvas(document.getElementById('captureArea'), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'XNZY_Professional_CV_6ANIK9.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }, 600);
    }
</script>
</body>
</html>
